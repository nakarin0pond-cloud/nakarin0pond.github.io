<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PlanFlow</title>

<link rel="stylesheet" href="style.css"/>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sb">
<div class="sb-scroll">

<div class="brand">
<div class="brand-gem">P</div>
<span class="brand-name">PlanFlow</span>
<button class="sb-x" id="sbClose">×</button>
</div>

<div class="nav">

<button class="nav-item active">
🏠 Dashboard
</button>

<button class="nav-item">
📝 Tasks
</button>

<button class="nav-item">
📅 Calendar
</button>

<button class="nav-item">
⚙ Settings
</button>

</div>

</div>
</aside>


<!-- MAIN -->
<main class="main">

<header class="topbar">

<button id="sbOpen">☰</button>

<h1 class="title">
PlanFlow
</h1>

</header>


<section class="content">

<div class="task-input">

<input
type="text"
id="taskInput"
placeholder="Add new task..."
/>

<button id="addTask">
Add
</button>

</div>

<ul id="taskList"></ul>

</section>

</main>

</div>

<script src="script.js"></script>

</body>
</html>
